workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - build
  - deploy

#Primarily concerned with setting up micromamba for the appropriate platforms
#All the build requirements excepting some compiler magic is there
.bash_before: &bash_before
  - export MAMBA_ROOT_PREFIX="$CI_PROJECT_DIR/tools/micromamba"
  - source ./ci/setup_mamba.sh
  - micromamba activate saline_39
  - pip install build

.powershell_before: &powershell_before
  - $env:MAMBA_ROOT_PREFIX="$CI_PROJECT_DIR/tools/micromamba"
  - . $CI_PROJECT_DIR/ci/setup_mamba.ps1
  - micromamba activate saline_39
  - pip install build

build_macos:
  stage: build
  tags:
    - macOS
  before_script:
    - *bash_before
  script:
    - pip install delocate
    - echo $PATH
    - cmake -S $CI_PROJECT_DIR -B "$CI_PROJECT_DIR/build" -DCMAKE_BUILD_TYPE=RELEASE
      -Dsaline_ENABLE_Fortran=ON -DCMAKE_Fortran_FLAGS:STRING="-ffree-line-length-none"
      -Dsaline_ENABLE_Python=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
    - cmake --build "$CI_PROJECT_DIR/build"
    - ctest --test-dir "$CI_PROJECT_DIR/build"
    - cmake --install build --prefix install
    - delocate-wheel -w ${CI_PROJECT_DIR}/install/wheelhouse ${CI_PROJECT_DIR}/build/src/python/dist/SalinePy*.whl
    - tar -czf darwin_arm.tar.gz install
  artifacts:
    name: darwin
    expire_in: 1 week
    paths:
      - darwin_arm.tar.gz

build_windows:
  stage: build
  tags:
    - windows
  before_script:
    - *powershell_before
  script:
    - pip install delvewheel
    - cmake
      -S $CI_PROJECT_DIR
      -B build
      -Dsaline_ENABLE_Fortran=OFF
      -Dsaline_ENABLE_Python=ON
      -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE
    - cmake --build build --target ALL_BUILD --config RELEASE
    - ctest --build-config RELEASE --test-dir build
    - cmake --install build --prefix install
    - $WHL_FILE = (Get-Item ${CI_PROJECT_DIR}\build\src\python\dist\*.whl).FullName
    - delvewheel repair -w ${CI_PROJECT_DIR}/install/wheelhouse ${WHL_FILE}
    - tar -czf windows_x86.tar.gz install
  artifacts:
    name: windows_x86
    expire_in: 1 week
    paths:
      - windows_x86.tar.gz

build_linux:
  stage: build
  rules:
    - when: always
  tags:
    - linux
  before_script:
    - *bash_before
  script:
    - pip install auditwheel
    - pip install patchelf
    - cmake -S $CI_PROJECT_DIR -B build -DCMAKE_BUILD_TYPE=RELEASE
      -Dsaline_ENABLE_Fortran=ON -DCMAKE_Fortran_FLAGS:STRING="-ffree-line-length-none"
      -Dsaline_ENABLE_Python=ON
    - cmake --build build
    - ctest --test-dir build --output-on-failure
    - cmake --install build --prefix install
    - auditwheel repair -w ${CI_PROJECT_DIR}/install/wheelhouse --plat manylinux_2_34_x86_64 ${CI_PROJECT_DIR}/build/src/python/dist/SalinePy*.whl
    - tar -czf linux_x86.tar.gz install
  artifacts:
    name: linux_x86
    expire_in: 1 week
    paths:
      - linux_x86.tar.gz

deploy_linux:
  stage: deploy
  tags:
    - linux
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: never
    - when: manual
  needs: [build_linux,build_windows,build_macos]
  before_script:
    - *bash_before
  script:
    # Code
    - $CODE_SALINE_URL="https://code.ornl.gov/api/v4/projects/10738/packages"
    # Upload the compiled artifacts
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file darwin_arm.tar.gz  "${CODE_SALINE_URL}/generic/macos/0.0.2/darwin_arm.tar.gz"'
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file windows_x86.tar.gz "${CODE_SALINE_URL}/generic/windows/0.0.2/windows_x86.tar.gz"'
    - 'curl --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file linux_x86.tar.gz "${CODE_SALINE_URL}/generic/linux/0.0.2/linux_x86.tar.gz"'
    # Extract just the wheels to a common location
    - tar -xzf linux_x86.tar.gz --wildcards --no-anchored '*.whl'
    - tar -xzf darwin_arm.tar.gz --wildcards --no-anchored '*.whl'
    - tar -xzf windows_x86.tar.gz --wildcards --no-anchored '*.whl'
    # Loop over files in that location and upload them 
    - ls install/wheelhouse/*.whl
    - |+
      for wheel in `ls install/wheelhouse/*.whl`
      do
        echo $wheel
        TWINE_USERNAME=gitlab-ci-token TWINE_PASSWORD=${CI_JOB_TOKEN} python -m twine upload --repository-url ${CODE_SALINE_URL}/pypi ${wheel}
      done
