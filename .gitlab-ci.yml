.gcc_83_before: &gcc_83_before
  - if [[ -f "/data/test_gcc/gcc-8.3.0/load_dev_env.sh" ]]; then BASE_DIR="/data/gitlab-runner"; . /data/test_gcc/gcc-8.3.0/load_dev_env.sh; ENV_BASE=/data/test_gcc/gcc-8.3.0; else BASE_DIR="/localhome/gitlab-runner"; . /projects/vera/gcc-8.3.0/load_dev_env.sh; ENV_BASE=/projects/vera/gcc-8.3.0; fi

.nix_before: &nix_before
    - SRC_DIR=`pwd`
    - BLD_DIR="$SRC_DIR/build/$CI_COMMIT_SHORT_SHA"
    - $INSTALL_DIR="$SRC_DIR/install/$CI_COMMIT_SHORT_SHA"

.windows_before: &windows_before
    - $SRC_DIR=$pwd.Path
    - $BLD_DIR="$SRC_DIR/build/$CI_COMMIT_SHORT_SHA"
    - $INSTALL_DIR="$SRC_DIR/install/$CI_COMMIT_SHORT_SHA"

build_macos:
  when:
    - manual
  allow_failure: true
  tags:
    - macOS
  script:
    - *nix_before
    - source $HOME/miniconda3/bin/activate
    - conda activate saline
    - cmake -S $SRC_DIR -B $BLD_DIR -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR -Dsaline_ENABLE_Fortran=ON -Dsaline_ENABLE_Python=ON
    - cmake --build $BLD_DIR
  artifacts:
    expire_in: 1 day
    paths:
      - $BLD_DIR

test_macos:
  when:
    - manual
  allow_failure: true
  tags:
    - macOS
  script:
    - *nix_before
    - source $HOME/miniconda3/bin/activate
    - conda activate saline
    - ctest --test-dir $BLD_DIR
  needs:
    - job: build_macos

stage_macos:
  when:
    - manual
  allow_failure: true
  tags:
    - macos
  script:
    - *nix_before
    - source $HOME/miniconda3/bin/activate
    - conda activate saline
    - cmake --install $BLD_DIR
  needs:
    - job: build_macos
  artifacts:
    name: macos_install
    expire_in: 1 week
    paths:
      - install

build_windows:
  when:
    - manual
  allow_failure: true
  tags:
    - windows
  script:
    - *windows_before
    - C:\Users\oxh\Miniconda3\\shell\\condabin\\conda-hook.ps1
    - conda activate saline_env
    - cmake -S $SRC_DIR -B $BLD_DIR -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR -Dsaline_ENABLE_Fortran=OFF -Dsaline_ENABLE_Python=ON -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE
    - cmake --build $BLD_DIR --target ALL_BUILD --config RELEASE
  artifacts:
    expire_in: 1 day
    paths:
      - $BLD_DIR

test_windows:
  when:
    - manual
  allow_failure: true
  tags:
    - windows
  script:
    - *windows_before
    - C:\Users\oxh\Miniconda3\\shell\\condabin\\conda-hook.ps1
    - conda activate saline_env
    - ctest --build-config RELEASE --test-dir /build/$CI_COMMIT_SHORT_SHA
  needs:
    - job: build_windows

stage_windows:
  when:
    - manual
  allow_failure: true
  tags:
    - windows
  script:
    - C:\Users\oxh\Miniconda3\shell\condabin\conda-hook.ps1
    - conda activate saline_env
    - cmake --install $BLD_DIR --config RELEASE
  needs:
    - job: build_windows
  artifacts:
    name: windows_install
    expire_in: 1 week
    paths:
      - install

build_linux_gcc83:
  tags:
    - linux
    - gcc
  script:
    #This first script is actually 100% machine dependent
    - *gcc_83_before
    - *nix_before
    - cmake -S $SRC_DIR -B $BLD_DIR -DCMAKE_BUILD_TYPE=RELEASE -DCMAKE_INSTALL_PREFIX=$INSTALL_DIR -Dsaline_ENABLE_Fortran=ON -DCMAKE_Fortran_FLAGS:STRING="-ffree-line-length-none" -Dsaline_ENABLE_Python=OFF
    - cmake --build $BLD_DIR
  artifacts:
    expire_in: 1 day
    paths:
      - $BLD_DIR

test linux_gcc83:
  tags:
    - linux
    - gcc
  script:
    - *gcc_83_before
    - *nix_before
    - ctest --test-dir build/
  needs:
    - job: build_linux_gcc83

stage_linux:
  when:
    - manual
  allow_failure: true
  tags:
    - linux
  script:
    - *gcc_83_before
    - *nix_before
    - cmake --install $BLD_DIR
  needs:
    - job: build_linux_gcc83
  artifacts:
    name: linux_install
    expire_in: 1 week
    paths:
      - install
