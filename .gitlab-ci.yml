workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - build
  - deploy

build_macos:
  stage: build
  rules:
    - when: manual
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  tags:
    - macOS
  script:
    - . "$CI_PROJECT_DIR/../saline_venv/bin/activate"
    - cmake -S $CI_PROJECT_DIR -B "$CI_PROJECT_DIR/build" -DCMAKE_BUILD_TYPE=RELEASE
      -DCMAKE_Fortran_COMPILER="/opt/homebrew/bin/gfortran"
      -Dsaline_ENABLE_Fortran=ON -DCMAKE_Fortran_FLAGS:STRING="-ffree-line-length-none"
      -Dsaline_ENABLE_Python=ON -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
      -DPython_EXECUTABLE=`which python3` -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    - cmake --build "$CI_PROJECT_DIR/build"
    - cmake --build "$CI_PROJECT_DIR/build" --target SalinePy_wheel
    - ctest --test-dir "$CI_PROJECT_DIR/build"
    - cmake --install build --prefix install
    - /Users/gitlab-runner/Library/Python/3.9/bin/delocate-wheel -w ${CI_PROJECT_DIR}/install/wheelhouse ${CI_PROJECT_DIR}/build/src/python/dist/salinepy*.whl
    - tar -czf darwin_arm.tar.gz install
  artifacts:
    name: darwin
    expire_in: 1 week
    paths:
      - darwin_arm.tar.gz

build_windows:
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  tags:
    - windows
  script:
    - . $CI_PROJECT_DIR/ci/setup_env.ps1
    - . $CI_BUILDS_DIR/.venvs/saline/Scripts/activate.ps1
    - cmake -S $CI_PROJECT_DIR -B build
      -Dsaline_ENABLE_Fortran=OFF
      -Dsaline_ENABLE_Python=ON
      -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=TRUE
    - cmake --build "$CI_PROJECT_DIR/build" --target ALL_BUILD --config RELEASE
    - cmake --build "$CI_PROJECT_DIR/build" --target SalinePy_wheel --config RELEASE
    - ctest --build-config RELEASE --test-dir build
    - cmake --install build --prefix install
    - $WHL_FILE = (Get-Item ${CI_PROJECT_DIR}\build\src\python\dist\*.whl).FullName
    - delvewheel repair -w ${CI_PROJECT_DIR}/install/wheelhouse ${WHL_FILE}
    - tar -czf windows_x86.tar.gz install
  artifacts:
    name: windows_x86
    expire_in: 1 week
    paths:
      - windows_x86.tar.gz

build_linux:
  image: savannah.ornl.gov/mstdb/saline_img@sha256:7dd78d6fa1c9343744909575c8dec11cc709541e01677dc2b7a0db106121df21
  stage: build
  variables:
    GIT_SUBMODULE_STRATEGY: normal
  rules:
    - when: always
  tags:
    - docker
  script:
    - cmake --preset linux-gcc-release
    - cmake --build --preset linux-gcc-release
    - ctest --preset linux-gcc-release  --output-on-failure
    - cmake --build --preset linux-gcc-release --target install 
    - auditwheel repair -w ${CI_PROJECT_DIR}/install/wheelhouse --plat manylinux_2_28_x86_64 ${CI_PROJECT_DIR}/build/linux-gcc-release/src/python/dist/salinepy*.whl
    - tar -czf linux_x86.tar.gz install
  artifacts:
    name: linux_x86
    expire_in: 1 week
    paths:
      - linux_x86.tar.gz

deploy_code:
  stage: deploy
  image: savannah.ornl.gov/mstdb/saline_deploy:latest
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: never
    - when: manual
  needs: [build_linux,build_windows,build_macos]
  script:
    # Code
    - CODE_SALINE_URL="https://code.ornl.gov/api/v4/projects/10738/packages"
    # Upload the compiled artifacts
    - 'curl --user "$CODE_DEPLOY:$CODE_DEPLOY_TOKEN" --upload-file darwin_arm.tar.gz  "${CODE_SALINE_URL}/generic/macos/0.0.2/darwin_arm.tar.gz"'
    - 'curl --user "$CODE_DEPLOY:$CODE_DEPLOY_TOKEN" --upload-file windows_x86.tar.gz "${CODE_SALINE_URL}/generic/windows/0.0.2/windows_x86.tar.gz"'
    - 'curl --user "$CODE_DEPLOY:$CODE_DEPLOY_TOKEN" --upload-file linux_x86.tar.gz "${CODE_SALINE_URL}/generic/linux/0.0.2/linux_x86.tar.gz"'
    # Extract just the wheels to a common location
    - tar -xzf linux_x86.tar.gz --wildcards --no-anchored '*.whl'
    - tar -xzf darwin_arm.tar.gz --wildcards --no-anchored '*.whl'
    - tar -xzf windows_x86.tar.gz --wildcards --no-anchored '*.whl'
    # Loop over files in that location and upload them
    - ls install/wheelhouse/*.whl
    - |+
      for wheel in `ls install/wheelhouse/*.whl`
      do
        echo $wheel
        TWINE_USERNAME=$CODE_DEPLOY TWINE_PASSWORD=$CODE_DEPLOY_TOKEN python -m twine upload --repository-url ${CODE_SALINE_URL}/pypi ${wheel}
      done
